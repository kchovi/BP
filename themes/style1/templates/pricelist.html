<!DOCTYPE html>
<html lang="cs">

<head>
    <title>Ceník</title>
    <meta name="author" content="Jakub Chovanec">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <link rel="stylesheet" href="{{ url_for('preview_static', filename='style.css') }}">
</head>

<style id="theme-vars">
    :root {
        --main-clr : {{user_colors["--main-clr"]}};
        --secondary-clr : {{user_colors["--secondary-clr"]}};
        --acc-clr : {{user_colors["--acc-clr"]}};
    }
</style>

<body>
    <header class="bg-color-secondary">
        <div class="wrapper flex header-subpg">
            <hgroup>
                <img src="{{ logo_path }}" alt="logo" class="main_logo">
                <h1 class="heading">Ceník</h1>
            </hgroup>

            {% include "navbar.jinja" %}
        </div>
    </header>

    <main class="bg-color-primary">
        <div class="wrapper">
            <section class="padding-y padding-x">
                <ul>
                    {%- for section in content -%}
                    {%- if section.id == 'services' -%}
                    {%- for service in section.service_list -%}
                    <li class="flex price-row" id="service_{{ loop.index }}">
                        <p class="service_name"><strong>{{service.name}}</strong></p>
                        <p class="service_price">{{service.price}} Kč</p>
                    </li>
                    {%- endfor -%}
                    {%- endif -%}
                    {%- endfor -%}
                </ul>
            </section>
    </main>

    <footer class="bg-color-secondary">
        <div class="wrapper flex center">
            <span>&copy;Jakub Chovanec 2024</span>
        </div>
    </footer>

</body>
